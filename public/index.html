<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Claudio</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="app" class="phone">
    <!-- weather row -->
    <div id="weather" class="weather-row">
      <span id="weather-icon"></span>
      <span id="weather-text"></span>
    </div>

    <!-- visualizer -->
    <div id="visualizer" class="visualizer"></div>

    <!-- big clock -->
    <div id="time-display" class="time-display">00:00</div>
    <div id="day-of-week" class="day-of-week">Monday</div>
    <div id="today-date" class="today-date"></div>

    <!-- song info -->
    <div id="song-info" class="song-info">
      <div id="song-title" class="song-title"></div>
      <div id="song-artist" class="song-artist"></div>
    </div>

    <!-- player bar: two row layout -->
    <div class="player-bar">
      <div class="player-controls">
        <button id="btn-prev" class="ctrl-btn" title="上一首">⏮</button>
        <span id="time-current" class="time-chip">0:00</span>
        <button id="btn-play" class="ctrl-btn play" title="播放/暂停">▶</button>
        <button id="btn-next" class="ctrl-btn" title="下一首">⏭</button>
        <span id="time-total" class="time-chip">0:00</span>
        <button id="btn-playlist" class="ctrl-btn" title="播放列表">☰</button>
        <span class="vol-icon">🔊</span>
        <input id="vol-slider" type="range" class="vol-slider" min="0" max="100" value="65">
      </div>
      <div id="progress-track" class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>

    <!-- playlist (collapsed by default) -->
    <div id="playlist-panel" class="playlist-panel collapsed">
      <div class="playlist-header">
        <span>播放列表</span>
        <span id="playlist-count">0首</span>
      </div>
      <div id="playlist-items" class="playlist-items">
        <div class="playlist-empty">暂无歌曲</div>
      </div>
    </div>

    <!-- thinking indicator -->
    <div id="thinking" class="thinking hidden">
      <span class="thinking-dot"></span>
      Claudio 正在思考...
    </div>

    <!-- chat header -->
    <div id="chat-header" class="chat-header">
      <span class="chat-header-name">Claudio</span>
      <span class="online-dot-breathe"></span>
      <span class="online-text">在线</span>
    </div>

    <!-- chat area -->
    <div id="chat-area" class="chat-area"></div>

    <!-- input -->
    <div class="input-area">
      <input id="chat-input" type="text" placeholder="和 DJ 说点什么..." autocomplete="off">
      <button id="send-btn" class="send-btn">↑</button>
    </div>

    <!-- hidden audio -->
    <audio id="audio-player" preload="auto"></audio>

    <!-- profile page (hidden by default) -->
    <div id="profile-page" class="profile-page"></div>

    <!-- toast -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
