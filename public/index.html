<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Claudio</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="app" class="phone">
    <!-- weather row -->
    <div id="weather" class="weather-row">
      <span id="weather-icon"></span>
      <span id="weather-text"></span>
    </div>

    <!-- weather detail popup -->
    <div id="weather-detail" class="weather-detail hidden">
      <div class="weather-detail-mask"></div>
      <div class="weather-detail-card">
        <div class="weather-detail-header">
          <span id="wd-city"></span>
          <span id="wd-temp"></span>
        </div>
        <div class="weather-detail-grid">
          <div class="wd-item"><span class="wd-label">🌅 日出</span><span id="wd-sunrise" class="wd-value">--</span></div>
          <div class="wd-item"><span class="wd-label">🌇 日落</span><span id="wd-sunset" class="wd-value">--</span></div>
          <div class="wd-item"><span class="wd-label">🌧️ 降雨概率</span><span id="wd-rain" class="wd-value">--</span></div>
          <div class="wd-item"><span class="wd-label">🌡️ 体感温度</span><span id="wd-feels" class="wd-value">--</span></div>
          <div class="wd-item"><span class="wd-label">💧 湿度</span><span id="wd-humidity" class="wd-value">--</span></div>
          <div class="wd-item"><span class="wd-label">🌬️ 风向</span><span id="wd-wind" class="wd-value">--</span></div>
          <div class="wd-item"><span class="wd-label">🔆 紫外线</span><span id="wd-uv" class="wd-value">--</span></div>
          <div class="wd-item"><span class="wd-label">👁️ 能见度</span><span id="wd-vis" class="wd-value">--</span></div>
          <div class="wd-item"><span class="wd-label">📊 气压</span><span id="wd-pressure" class="wd-value">--</span></div>
        </div>
      </div>
    </div>

    <!-- visualizer -->
    <div id="visualizer" class="visualizer"></div>

    <!-- big clock -->
    <div id="time-display" class="time-display">00:00</div>
    <div id="day-of-week" class="day-of-week">Monday</div>
    <div id="today-date" class="today-date"></div>

    <!-- song info -->
    <div id="song-info" class="song-info">
      <div id="song-title" class="song-title"></div>
      <div id="song-artist" class="song-artist"></div>
    </div>

    <!-- player bar -->
    <div class="player-bar">
      <div class="player-controls">
        <div class="song-info-inline">
          <span id="song-title-inline" class="song-title-inline">Claudio FM</span>
          <span class="song-sep">·</span>
          <span id="song-artist-inline" class="song-artist-inline">等待点歌</span>
        </div>
        <button id="btn-prev" class="ctrl-btn" title="上一首">⏮</button>
        <button id="btn-play" class="ctrl-btn play" title="播放/暂停">▶</button>
        <button id="btn-next" class="ctrl-btn" title="下一首">⏭</button>
        <button id="btn-playlist" class="ctrl-btn" title="播放列表">☰</button>
        <span class="vol-icon" id="vol-icon">VOL</span>
        <div class="vol-slider" id="vol-slider" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="65" tabindex="0">
          <div class="vol-track">
            <div class="vol-track-fill"></div>
          </div>
        </div>
      </div>
      <div id="progress-track" class="progress-track">
        <span id="time-current" class="time-chip">0:00</span>
        <div class="progress-bar-bg">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <span id="time-total" class="time-chip">0:00</span>
      </div>
    </div>

    <!-- playlist (collapsed by default) -->
    <div id="playlist-panel" class="playlist-panel collapsed">
      <div class="playlist-header">
        <span>播放列表</span>
        <span id="playlist-count">0首</span>
      </div>
      <div id="playlist-items" class="playlist-items">
        <div class="playlist-empty">暂无歌曲</div>
      </div>
    </div>

    <!-- favorites panel (overlay) -->
    <div id="favorites-panel" class="favorites-panel hidden">
      <div class="favorites-panel-mask"></div>
      <div class="favorites-panel-card">
        <div class="favorites-panel-header">
          <span class="favorites-panel-title">❤️ 我的收藏</span>
          <button id="favorites-close" class="favorites-close-btn">✕</button>
        </div>
        <div id="favorites-list" class="favorites-list">
          <div class="favorites-loading">加载中...</div>
        </div>
      </div>
    </div>

    <!-- chat header -->
    <div id="chat-header" class="chat-header">
      <span class="chat-header-name">Claudio</span>
      <div class="chat-header-actions">
        <button id="btn-import" class="history-btn" title="导入歌单">📥</button>
        <button id="btn-favorites" class="history-btn" title="收藏">❤️</button>
        <button id="btn-clear" class="history-btn" title="清除记忆和品味数据">🧹</button>
        <button id="btn-new-chat" class="history-btn" title="新对话">+</button>
        <button id="btn-sync" class="history-btn" title="同步会话到云端">☁️</button>
        <button id="btn-history" class="history-btn" title="历史对话">历史</button>
        <span class="online-dot-static"></span>
        <span class="online-text">在线</span>
      </div>
    </div>

    <!-- chat area -->
    <div id="chat-area" class="chat-area"></div>

    <!-- input -->
    <div class="input-area">
      <input id="chat-input" type="text" placeholder="和 DJ 说点什么..." autocomplete="off">
      <button id="send-btn" class="send-btn">↑</button>
    </div>

    <!-- status bar -->
    <div class="status-bar">
      <span>CLAUDIO FM</span>
      <span>CONNECTED</span>
    </div>

    <!-- hidden audio -->
    <audio id="audio-player" preload="auto" crossorigin="anonymous"></audio>

    <!-- profile page (hidden by default) -->
    <div id="profile-page" class="profile-page"></div>

    <!-- toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- import dialog -->
    <div id="import-dialog" class="import-dialog hidden">
      <div class="import-dialog-mask"></div>
      <div class="import-dialog-card">
        <div class="import-dialog-title">导入网易云歌单</div>
        <div class="import-dialog-desc">粘贴歌单链接，让 Claudio 更懂你的品味</div>
        <input id="import-url" type="text" class="import-url-input" placeholder="https://music.163.com/playlist?id=..." autocomplete="off">
        <div id="import-error" class="import-error hidden"></div>
        <div class="import-dialog-btns">
          <button id="import-cancel" class="import-btn cancel">取消</button>
          <button id="import-submit" class="import-btn submit">导入</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
